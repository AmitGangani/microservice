server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service-route
              uri: lb://auth-service
              predicates:
                - Path=/auth/**

            - id: user-service-route
              uri: lb://user-service
              predicates:
                - Path=/users/**

            - id: order-service-route
              uri: lb://order-service
              predicates:
                - Path=/orders/**
