services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped
    networks:
      - micro-net

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "29092:29092"
    restart: unless-stopped
    networks:
      - micro-net

  discovery-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: discovery-server
    container_name: discovery-server
    environment:
      SERVER_PORT: 8761
    ports:
      - "8761:8761"
    restart: on-failure
    networks:
      - micro-net

  config-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: config-server
    container_name: config-server
    depends_on:
      - discovery-server
    environment:
      SERVER_PORT: 8888
    ports:
      - "8888:8888"
    restart: on-failure
    networks:
      - micro-net

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: auth-service
    container_name: auth-service
    depends_on:
      - discovery-server
    environment:
      SERVER_PORT: 8083
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    ports:
      - "8083:8083"
    restart: on-failure
    networks:
      - micro-net

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: userservice
    container_name: user-service
    depends_on:
      - discovery-server
      - config-server
    environment:
      SERVER_PORT: 8081
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    ports:
      - "8081:8081"
    restart: on-failure
    networks:
      - micro-net

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: orderservice
    container_name: order-service
    depends_on:
      - discovery-server
      - config-server
      - kafka
    environment:
      SERVER_PORT: 8082
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8082:8082"
    restart: on-failure
    networks:
      - micro-net

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: notification-service
    container_name: notification-service
    depends_on:
      - kafka
    environment:
      SERVER_PORT: 8084
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8084:8084"
    restart: on-failure
    networks:
      - micro-net

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: apigateway
    container_name: api-gateway
    depends_on:
      - discovery-server
      - config-server
      - auth-service
      - user-service
      - order-service
    environment:
      SERVER_PORT: 8080
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    ports:
      - "8080:8080"
    restart: on-failure
    networks:
      - micro-net

networks:
  micro-net:
    name: micro-net
