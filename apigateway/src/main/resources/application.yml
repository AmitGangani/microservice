server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service-route
              uri: http://localhost:8081
              predicates:
                - Path=/users/**

            - id: order-service-route
              uri: http://localhost:8082
              predicates:
                - Path=/orders/**