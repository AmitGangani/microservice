spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service-route
              uri: lb://auth-service
              predicates:
                - Path=/auth/**
            - id: user-service-route
              uri: lb://user-service
              predicates:
                - Path=/users/**
            - id: order-service-route
              uri: lb://order-service
              predicates:
                - Path=/orders/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
